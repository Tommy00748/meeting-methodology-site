<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>晋总方法论体系</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0c0c14;--bg2:#12121c;--bg3:#1a1a28;
  --surface:rgba(255,255,255,0.03);--surface2:rgba(255,255,255,0.06);
  --glass:rgba(255,255,255,0.04);--glass-border:rgba(255,255,255,0.08);
  --amber:#d4a853;--amber-light:#f0d78c;--amber-dim:rgba(212,168,83,0.15);
  --amber-glow:rgba(212,168,83,0.25);--amber-subtle:rgba(212,168,83,0.08);
  --warm:#f5f0e8;--warm-dim:#a09888;--warm-muted:#6a6458;
  --serif:'Noto Serif SC',Georgia,serif;--sans:'DM Sans',system-ui,sans-serif;
  --r:20px;--r2:12px;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--warm);font-family:var(--sans);line-height:1.75;overflow-x:hidden}
::selection{background:var(--amber);color:var(--bg)}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--amber-dim);border-radius:3px}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:100px 40px 80px;position:relative}
.hero-bg{position:absolute;inset:0;overflow:hidden}
.hero-bg .orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.4}
.hero-bg .orb1{width:500px;height:500px;background:radial-gradient(circle,rgba(212,168,83,0.2),transparent 70%);top:-10%;left:-5%;animation:orbFloat 20s ease-in-out infinite}
.hero-bg .orb2{width:400px;height:400px;background:radial-gradient(circle,rgba(180,120,60,0.15),transparent 70%);bottom:0;right:-5%;animation:orbFloat 25s ease-in-out infinite reverse}
.hero-bg .orb3{width:300px;height:300px;background:radial-gradient(circle,rgba(212,168,83,0.1),transparent 70%);top:40%;left:50%;transform:translateX(-50%);animation:orbFloat 18s ease-in-out infinite 5s}
@keyframes orbFloat{0%,100%{transform:translate(0,0)}33%{transform:translate(30px,-40px)}66%{transform:translate(-20px,30px)}}
.hero-grid{position:absolute;inset:0;background-image:
  linear-gradient(rgba(212,168,83,0.03) 1px,transparent 1px),
  linear-gradient(90deg,rgba(212,168,83,0.03) 1px,transparent 1px);
  background-size:80px 80px;mask-image:radial-gradient(ellipse 60% 50% at 50% 50%,black,transparent)}
.hero-content{position:relative;z-index:2}
.hero-eyebrow{font-size:.8rem;letter-spacing:8px;color:var(--amber);text-transform:uppercase;margin-bottom:32px;opacity:0;animation:heroIn 1s .3s forwards}
.hero-title{font-family:var(--serif);font-size:clamp(3rem,7vw,6.5rem);font-weight:900;line-height:1.1;margin-bottom:28px;opacity:0;animation:heroIn 1s .5s forwards}
.hero-title .line{display:block}
.hero-title .accent{background:linear-gradient(135deg,var(--amber),var(--amber-light),#fff,var(--amber));background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 6s ease infinite}
@keyframes shimmer{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.hero-sub{font-size:1.1rem;color:var(--warm-dim);max-width:560px;margin:0 auto 56px;font-weight:300;line-height:1.9;opacity:0;animation:heroIn 1s .7s forwards}
.hero-metrics{display:flex;gap:64px;justify-content:center;opacity:0;animation:heroIn 1s .9s forwards}
.metric{text-align:center}
.metric-val{font-family:var(--serif);font-size:3.2rem;font-weight:900;background:linear-gradient(135deg,var(--amber),var(--amber-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.metric-label{font-size:.7rem;letter-spacing:3px;color:var(--warm-muted);text-transform:uppercase;margin-top:4px}
.hero-line{width:1px;height:80px;background:linear-gradient(to bottom,var(--amber-dim),transparent);margin:60px auto 0;opacity:0;animation:heroIn 1s 1.1s forwards}
@keyframes heroIn{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

.section{padding:100px 40px;max-width:1100px;margin:0 auto}
.section-head{margin-bottom:64px}
.section-tag{display:inline-flex;align-items:center;gap:8px;font-size:.7rem;letter-spacing:4px;color:var(--amber);text-transform:uppercase;margin-bottom:16px}
.section-tag::before{content:'';width:24px;height:1px;background:var(--amber)}
.section-title{font-family:var(--serif);font-size:clamp(1.8rem,3.5vw,2.8rem);font-weight:700;line-height:1.3}
.section-desc{font-size:.95rem;color:var(--warm-dim);margin-top:12px;max-width:600px;font-weight:300}

.overview-canvas{width:100%;padding:40px 0;position:relative}
#networkSvg{width:100%;height:500px}
.node-group{cursor:pointer}
.node-group text{pointer-events:none}
.node-circle{transition:all .3s}
.node-group:hover .node-circle{filter:brightness(1.3)}
.node-group:hover .node-label{fill:var(--amber-light)!important}
.link{stroke-dasharray:4 4;animation:dashFlow 20s linear infinite}
@keyframes dashFlow{to{stroke-dashoffset:-200}}

.layers{padding:60px 40px 120px;max-width:1100px;margin:0 auto}
.layer-card{margin-bottom:24px;border-radius:var(--r);overflow:hidden;border:1px solid var(--glass-border);background:var(--glass);transition:all .4s cubic-bezier(.22,1,.36,1);opacity:0;transform:translateY(50px)}
.layer-card.visible{opacity:1;transform:translateY(0)}
.layer-card:hover{border-color:rgba(212,168,83,0.2)}
.layer-card.open{border-color:var(--amber-dim);background:var(--surface2)}
.layer-top{padding:28px 36px;cursor:pointer;display:flex;align-items:center;gap:24px;transition:all .3s;position:relative}
.layer-top::after{content:'';position:absolute;right:36px;top:50%;transform:translateY(-50%);width:20px;height:20px;border-right:2px solid var(--warm-muted);border-bottom:2px solid var(--warm-muted);transition:all .3s}
.layer-card.open .layer-top::after{transform:translateY(-50%) rotate(45deg);border-color:var(--amber)}
.layer-badge{width:56px;height:56px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0;position:relative;overflow:hidden}
.layer-badge::before{content:'';position:absolute;inset:0;border-radius:inherit;opacity:.15}
.layer-card:nth-child(1) .layer-badge{background:linear-gradient(135deg,#2a1f0f,#1a150a)}
.layer-card:nth-child(1) .layer-badge::before{background:var(--amber)}
.layer-card:nth-child(2) .layer-badge{background:linear-gradient(135deg,#0f1a2a,#0a121a)}
.layer-card:nth-child(2) .layer-badge::before{background:#6b9fff}
.layer-card:nth-child(3) .layer-badge{background:linear-gradient(135deg,#0f2a1a,#0a1a0f)}
.layer-card:nth-child(3) .layer-badge::before{background:#6bffa0}
.layer-card:nth-child(4) .layer-badge{background:linear-gradient(135deg,#2a0f2a,#1a0a1a)}
.layer-card:nth-child(4) .layer-badge::before{background:#c06bff}
.layer-card:nth-child(5) .layer-badge{background:linear-gradient(135deg,#2a1a0f,#1a100a)}
.layer-card:nth-child(5) .layer-badge::before{background:#ff8c6b}
.layer-card:nth-child(6) .layer-badge{background:linear-gradient(135deg,#1a2a2a,#0a1a1a)}
.layer-card:nth-child(6) .layer-badge::before{background:#6bfff0}
.layer-card:nth-child(7) .layer-badge{background:linear-gradient(135deg,#2a0f1a,#1a0a10)}
.layer-card:nth-child(7) .layer-badge::before{background:#ff6ba0}
.layer-meta{flex:1}
.layer-tier{font-size:.65rem;letter-spacing:3px;color:var(--warm-muted);text-transform:uppercase}
.layer-name{font-family:var(--serif);font-size:1.4rem;font-weight:700;margin:4px 0}
.layer-sub{font-size:.85rem;color:var(--warm-dim);font-weight:300}
.layer-num-badge{font-size:.7rem;color:var(--warm-muted);background:var(--surface2);padding:6px 14px;border-radius:20px;letter-spacing:1px}
.layer-expand{max-height:0;overflow:hidden;transition:max-height .6s cubic-bezier(.22,1,.36,1)}
.layer-card.open .layer-expand{max-height:4000px}

.items-pad{padding:4px 36px 32px}
.item-block{padding:28px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.item-block:last-child{border-bottom:none}
.item-row{display:flex;gap:20px}
.item-idx{font-family:var(--serif);font-size:2rem;font-weight:900;min-width:48px;line-height:1.2;
  background:linear-gradient(135deg,var(--amber-dim),transparent);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.item-body{flex:1}
.item-h{font-family:var(--serif);font-size:1.15rem;font-weight:700;margin-bottom:10px}
.item-p{font-size:.9rem;color:var(--warm-dim);line-height:1.9;font-weight:300}
.quote-btn{display:inline-flex;align-items:center;gap:6px;margin-top:14px;padding:8px 18px;border-radius:20px;border:1px solid var(--amber-dim);background:transparent;color:var(--amber);font-size:.78rem;cursor:pointer;transition:all .3s;font-family:var(--sans);letter-spacing:.5px}
.quote-btn:hover{background:var(--amber-dim);border-color:var(--amber-glow)}
.quote-btn.open{background:var(--amber);color:var(--bg);border-color:var(--amber)}
.quote-box{max-height:0;overflow:hidden;transition:max-height .5s ease}
.quote-box.show{max-height:600px}
.q-card{margin-top:16px;padding:24px 28px;border-radius:var(--r2);position:relative;
  background:linear-gradient(135deg,rgba(212,168,83,0.06),rgba(212,168,83,0.02));border:1px solid rgba(212,168,83,0.1)}
.q-card+.q-card{margin-top:12px}
.q-mark{position:absolute;top:8px;left:16px;font-family:var(--serif);font-size:4rem;line-height:1;color:var(--amber);opacity:.2}
.q-text{font-family:var(--serif);font-size:.95rem;color:var(--amber-light);line-height:2;padding-left:32px;font-style:italic}
.q-who{padding-left:32px;margin-top:10px;font-size:.72rem;color:var(--warm-muted);letter-spacing:1px;font-style:normal;font-family:var(--sans)}

.conclusion{padding:80px 40px 140px;max-width:800px;margin:0 auto;text-align:center}
.end-line{width:60px;height:2px;background:linear-gradient(90deg,transparent,var(--amber),transparent);margin:0 auto 48px}
.end-quote{font-family:var(--serif);font-size:clamp(1.3rem,2.5vw,1.8rem);font-weight:700;color:var(--amber-light);line-height:2;padding:0 20px}
.end-note{margin-top:40px;font-size:.92rem;color:var(--warm-dim);font-weight:300;line-height:2}
.end-note strong{color:var(--amber);font-weight:500}

.float-nav{position:fixed;right:32px;top:50%;transform:translateY(-50%);z-index:100;display:flex;flex-direction:column;gap:12px}
.float-dot{width:10px;height:10px;border-radius:50%;border:1.5px solid var(--warm-muted);background:transparent;cursor:pointer;transition:all .3s;position:relative}
.float-dot.active{border-color:var(--amber);background:var(--amber);box-shadow:0 0 12px var(--amber-glow)}
.float-dot::after{content:attr(data-label);position:absolute;right:20px;top:50%;transform:translateY(-50%);white-space:nowrap;font-size:.7rem;color:var(--warm-dim);opacity:0;transition:all .3s;pointer-events:none;letter-spacing:1px}
.float-dot:hover::after{opacity:1}

.back-top{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(80px);z-index:100;
  padding:10px 28px;border-radius:30px;background:var(--surface2);border:1px solid var(--glass-border);
  color:var(--warm-dim);font-size:.75rem;cursor:pointer;transition:all .4s;letter-spacing:2px;
  backdrop-filter:blur(10px);font-family:var(--sans)}
.back-top.show{transform:translateX(-50%) translateY(0)}
.back-top:hover{color:var(--amber);border-color:var(--amber-dim)}

@media(max-width:768px){
  .hero-metrics{gap:32px}
  .float-nav{display:none}
  .layer-top{padding:20px 24px;gap:16px}
  .items-pad{padding:4px 24px 24px}
  .section,.layers{padding-left:20px;padding-right:20px}
  .hero{padding:80px 20px 60px}
}
</style>
</head>
<body>

<div class="float-nav" id="floatNav">
  <div class="float-dot active" data-label="起点" onclick="scrollTo2('hero')"></div>
  <div class="float-dot" data-label="总览" onclick="scrollTo2('overview')"></div>
  <div class="float-dot" data-label="底层心法" onclick="scrollTo2('L1')"></div>
  <div class="float-dot" data-label="做事" onclick="scrollTo2('L2')"></div>
  <div class="float-dot" data-label="管理" onclick="scrollTo2('L3')"></div>
  <div class="float-dot" data-label="沟通" onclick="scrollTo2('L4')"></div>
  <div class="float-dot" data-label="决策" onclick="scrollTo2('L5')"></div>
  <div class="float-dot" data-label="用人" onclick="scrollTo2('L6')"></div>
  <div class="float-dot" data-label="自我" onclick="scrollTo2('L7')"></div>
  <div class="float-dot" data-label="核心" onclick="scrollTo2('end')"></div>
</div>

<section class="hero" id="hero">
  <div class="hero-bg">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
    <div class="hero-grid"></div>
  </div>
  <div class="hero-content">
    <div class="hero-eyebrow">基于四场内部会议 · 系统梳理</div>
    <h1 class="hero-title">
      <span class="line">晋总</span>
      <span class="line"><span class="accent">方法论体系</span></span>
    </h1>
    <p class="hero-sub">从思维模式到自我管理，一套完整的做事与管理哲学。七层架构，二十五条法则，来自实战的智慧结晶。</p>
    <div class="hero-metrics">
      <div class="metric"><div class="metric-val">7</div><div class="metric-label">核心层次</div></div>
      <div class="metric"><div class="metric-val">25</div><div class="metric-label">方法论法则</div></div>
      <div class="metric"><div class="metric-val">4</div><div class="metric-label">场会议提炼</div></div>
    </div>
    <div class="hero-line"></div>
  </div>
</section>

<section class="section" id="overview">
  <div class="section-head">
    <div class="section-tag">Architecture</div>
    <h2 class="section-title">体系架构</h2>
    <p class="section-desc">七层递进，从底层心法到自我管理，每一层都是下一层的基础。点击节点可跳转。</p>
  </div>
  <div class="overview-canvas">
    <svg id="networkSvg" viewBox="0 0 1000 520"></svg>
  </div>
</section>

<section class="layers" id="layersSection">
  <div class="section-head">
    <div class="section-tag">Deep Dive</div>
    <h2 class="section-title">逐层展开</h2>
    <p class="section-desc">二十五条法则，每一条都附有老板原话金句。点击展开详情。</p>
  </div>
  <div id="layersBox"></div>
</section>

<section class="conclusion" id="end">
  <div class="end-line"></div>
  <div class="end-quote">有因就有果，我不相信你把因都做完了没有一个好的结果。</div>
  <p class="end-note">从<strong>思维模式</strong>出发，通过<strong>商业闭环</strong>指导做事，<br>用<strong>近距离带人</strong>打造团队，以<strong>范例权</strong>凝聚人心，<br>最终让每个人在<strong>创业心态</strong>下把因做足。</p>
</section>

<button class="back-top" id="backTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">回到顶部</button>

<script src="app.js"></script>
</body>
</html>
